version: '3.8'

services:
  db:
    image: timescale/timescaledb-ha:pg15-all
    container_name: termo-astana-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=termo_astana
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
